<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    var _vueOk = false, _axiosOk = false, _queue = []
    function _tryCDN(name, urls, i) {
      if (i >= urls.length) return
      var s = document.createElement('script')
      s.src = urls[i]
      s.onload = function() { if (name === 'vue') _vueOk = true; else _axiosOk = true; while (_queue.length && _vueOk && _axiosOk) _queue.shift()() }
      s.onerror = function() { _tryCDN(name, urls, i+1) }
      document.head.appendChild(s)
    }
    _tryCDN('vue', ['https://cdnjs.cloudflare.com/ajax/libs/vue/3.5.13/vue.global.prod.js','https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js','https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js'], 0)
    _tryCDN('axios', ['https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.9/axios.min.js','https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js','https://unpkg.com/axios@1.7.9/dist/axios.min.js'], 0)
    setTimeout(function() {
      if (!_vueOk || !_axiosOk) {
        var el = document.getElementById('app')
        if (el) el.innerHTML = '<div style="padding:40px;text-align:center;font-size:14px;"><p style="color:red;">依赖加载失败</p><p style="color:#999;margin-top:8px;">请检查网络连接后 <a href="#" onclick="location.reload()" style="color:#3b82f6;">刷新页面</a></p></div>'
      }
    }, 15000)
  </script>
</head>
<body>
  <script id="tpl" type="text/x-template">
    <div class="min-h-screen bg-gray-50 font-sans text-gray-700">
      <template v-if="viewMode === 'list'">
        <div class="max-w-7xl mx-auto p-6">
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 border-t-2 border-t-emerald-500 p-6">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-xl font-bold text-gray-800 tracking-tight">订单管理</h2>
              <button @click="doCreate" class="inline-flex items-center gap-1.5 px-4 py-2 bg-emerald-600 text-white text-sm font-medium rounded-lg hover:bg-emerald-700 transition-colors duration-200 shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                新建订单
              </button>
            </div>

            <div class="border border-gray-200 rounded-lg overflow-hidden mb-4">
              <div @click="showSearch = !showSearch" class="flex items-center gap-2 px-4 py-2.5 bg-gray-50 cursor-pointer select-none hover:bg-gray-100 transition-colors duration-200 text-sm font-medium text-gray-600">
                <svg class="w-3 h-3 transition-transform duration-200" :class="showSearch ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                搜索条件
              </div>
              <div v-show="showSearch" class="px-4 py-3 border-t border-gray-200">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                  <div><label class="block text-xs text-gray-500 mb-1">关键词</label><input v-model="sf.keyword" placeholder="订单号/客户" @keyup.enter="search" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all duration-200" /></div>
                  <div><label class="block text-xs text-gray-500 mb-1">状态</label>
                    <select v-model="sf.status" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all duration-200 bg-white">
                      <option value="">全部</option>
                      <option value="pending">待确认</option>
                      <option value="confirmed">已确认</option>
                      <option value="shipped">已发货</option>
                      <option value="completed">已完成</option>
                      <option value="cancelled">已取消</option>
                    </select>
                  </div>
                  <div class="flex items-end gap-2">
                    <button @click="clear" class="px-4 py-2 border border-gray-300 text-gray-600 text-sm rounded-lg hover:bg-gray-50 transition-colors duration-200">清除</button>
                    <button @click="search" class="px-4 py-2 bg-emerald-600 text-white text-sm rounded-lg hover:bg-emerald-700 transition-colors duration-200 shadow-sm">搜索</button>
                  </div>
                </div>
              </div>
            </div>

            <div v-if="loading" class="text-center py-12"><div class="inline-block w-6 h-6 border-2 border-emerald-600 border-t-transparent rounded-full animate-spin"></div></div>

            <div v-if="!loading" class="overflow-x-auto rounded-lg border border-gray-200">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                    <th class="px-4 py-3 text-center w-12">#</th>
                    <th class="px-4 py-3 text-left">订单号</th>
                    <th class="px-4 py-3 text-left">客户</th>
                    <th class="px-4 py-3 text-right">金额</th>
                    <th class="px-4 py-3 text-center">状态</th>
                    <th class="px-4 py-3 text-left">创建时间</th>
                    <th class="px-4 py-3 text-center w-44">操作</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <tr v-for="(row, i) in list" :key="row.id" class="hover:bg-emerald-50 cursor-pointer transition-colors duration-200">
                    <td class="px-4 py-3 text-center text-gray-400 tabular-nums">{{ (pg.page - 1) * pg.size + i + 1 }}</td>
                    <td class="px-4 py-3"><span class="text-emerald-600 hover:text-emerald-800 font-medium cursor-pointer" @click="doDetail(row)">{{ row.orderNo }}</span></td>
                    <td class="px-4 py-3 text-gray-600">{{ row.customerName }}</td>
                    <td class="px-4 py-3 text-right tabular-nums font-medium">￥{{ row.totalAmount ? Number(row.totalAmount).toFixed(2) : '0.00' }}</td>
                    <td class="px-4 py-3 text-center">
                      <span :class="statusClass(row.status)" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium">{{ statusLabel(row.status) }}</span>
                    </td>
                    <td class="px-4 py-3 text-gray-500 tabular-nums">{{ row.createdAt }}</td>
                    <td class="px-4 py-3 text-center">
                      <button @click.stop="doDetail(row)" class="text-emerald-600 hover:text-emerald-800 text-xs font-medium transition-colors duration-200">详情</button>
                      <button v-if="row.status === 'pending'" @click.stop="doChangeStatus(row, 'confirmed')" class="text-blue-600 hover:text-blue-800 text-xs font-medium ml-3 transition-colors duration-200">确认</button>
                      <button v-if="row.status === 'confirmed'" @click.stop="doChangeStatus(row, 'shipped')" class="text-amber-600 hover:text-amber-800 text-xs font-medium ml-3 transition-colors duration-200">发货</button>
                      <button v-if="row.status === 'shipped'" @click.stop="doChangeStatus(row, 'completed')" class="text-green-600 hover:text-green-800 text-xs font-medium ml-3 transition-colors duration-200">完成</button>
                      <button v-if="row.status === 'pending'" @click.stop="doChangeStatus(row, 'cancelled')" class="text-red-500 hover:text-red-700 text-xs font-medium ml-3 transition-colors duration-200">取消</button>
                    </td>
                  </tr>
                </tbody>
              </table>
              <div v-if="list.length === 0 && !loading" class="text-center py-12 text-gray-400 text-sm">未找到符合条件的数据。</div>
            </div>

            <div v-if="total > 0" class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
              <div class="text-sm text-gray-500">共 <span class="font-medium text-gray-700">{{ total }}</span> 条</div>
              <div class="flex items-center gap-2 text-sm">
                <select v-model="pg.size" @change="search" class="px-2 py-1.5 border border-gray-300 rounded-lg text-sm outline-none bg-white">
                  <option :value="10">10条/页</option>
                  <option :value="20">20条/页</option>
                  <option :value="50">50条/页</option>
                </select>
                <button :disabled="pg.page <= 1" @click="pg.page--;search()" :class="pg.page <= 1 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-100'" class="px-3 py-1.5 border border-gray-300 rounded-lg transition-colors duration-200 font-medium">上一页</button>
                <span class="px-2 text-gray-600 font-medium">{{ pg.page }} / {{ totalPages }}</span>
                <button :disabled="pg.page >= totalPages" @click="pg.page++;search()" :class="pg.page >= totalPages ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-100'" class="px-3 py-1.5 border border-gray-300 rounded-lg transition-colors duration-200 font-medium">下一页</button>
              </div>
            </div>
          </div>
        </div>
      </template>

      <template v-else-if="viewMode === 'detail'">
        <div class="max-w-4xl mx-auto p-6">
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 border-t-2 border-t-emerald-500 p-6">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-xl font-bold text-gray-800 tracking-tight">订单详情 #{{ f.orderNo }}</h2>
              <div class="flex gap-2">
                <button @click="doBack" class="px-4 py-2 border border-gray-300 text-gray-600 text-sm rounded-lg hover:bg-gray-50 transition-colors duration-200">返回</button>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-x-6 gap-y-4 text-sm mb-6">
              <div><span class="text-gray-400 text-xs">订单ID</span><p class="font-medium mt-0.5">{{ f.id || '-' }}</p></div>
              <div><span class="text-gray-400 text-xs">订单编号</span><p class="font-medium mt-0.5">{{ f.orderNo || '-' }}</p></div>
              <div><span class="text-gray-400 text-xs">客户姓名</span><p class="font-medium mt-0.5">{{ f.customerName || '-' }}</p></div>
              <div><span class="text-gray-400 text-xs">订单状态</span>
                <span :class="statusClass(f.status)" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium mt-0.5">{{ statusLabel(f.status) }}</span>
              </div>
              <div><span class="text-gray-400 text-xs">总金额</span><p class="font-medium mt-0.5">￥{{ f.totalAmount ? Number(f.totalAmount).toFixed(2) : '0.00' }}</p></div>
              <div><span class="text-gray-400 text-xs">备注</span><p class="font-medium mt-0.5">{{ f.remark || '-' }}</p></div>
              <div><span class="text-gray-400 text-xs">创建时间</span><p class="mt-0.5 tabular-nums" v-text="f.createdAt || '-'"></p></div>
              <div><span class="text-gray-400 text-xs">更新时间</span><p class="mt-0.5 tabular-nums" v-text="f.updatedAt || '-'"></p></div>
            </div>

            <h3 class="text-sm font-semibold text-gray-800 mb-3">订单明细</h3>
            <div class="overflow-x-auto rounded-lg border border-gray-200">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                    <th class="px-4 py-3 text-left">商品名称</th>
                    <th class="px-4 py-3 text-right">单价</th>
                    <th class="px-4 py-3 text-right">数量</th>
                    <th class="px-4 py-3 text-right">小计</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <tr v-for="(item, i) in f.items" :key="item.id || i" class="hover:bg-gray-50">
                    <td class="px-4 py-3">{{ item.itemName }}</td>
                    <td class="px-4 py-3 text-right tabular-nums">￥{{ item.unitPrice ? Number(item.unitPrice).toFixed(2) : '0.00' }}</td>
                    <td class="px-4 py-3 text-right tabular-nums">{{ item.quantity }}</td>
                    <td class="px-4 py-3 text-right tabular-nums font-medium">￥{{ item.subtotal ? Number(item.subtotal).toFixed(2) : '0.00' }}</td>
                  </tr>
                </tbody>
                <tfoot>
                  <tr class="bg-gray-50 font-medium">
                    <td colspan="3" class="px-4 py-3 text-right text-gray-600">合计</td>
                    <td class="px-4 py-3 text-right tabular-nums">￥{{ f.totalAmount ? Number(f.totalAmount).toFixed(2) : '0.00' }}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      </template>

      <template v-else>
        <div class="max-w-3xl mx-auto p-6">
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 border-t-2 border-t-emerald-500 p-6">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-xl font-bold text-gray-800 tracking-tight">新建订单</h2>
              <div class="flex gap-2">
                <button @click="doBack" class="px-4 py-2 border border-gray-300 text-gray-600 text-sm rounded-lg hover:bg-gray-50 transition-colors duration-200">返回</button>
                <button @click="doSave" class="px-4 py-2 bg-emerald-600 text-white text-sm rounded-lg hover:bg-emerald-700 transition-colors duration-200 shadow-sm">保存</button>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-x-6 gap-y-4 text-sm mb-6">
              <div class="col-span-2"><span class="text-gray-400 text-xs"><span class="text-red-500">*</span> 客户姓名</span>
                <input v-model="cf.customerName" placeholder="请输入客户姓名" class="mt-0.5 w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all duration-200" />
              </div>
              <div class="col-span-2"><span class="text-gray-400 text-xs">备注</span>
                <textarea v-model="cf.remark" placeholder="订单备注" rows="2" class="mt-0.5 w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all duration-200 resize-none"></textarea>
              </div>
            </div>

            <div class="flex items-center justify-between mb-3">
              <h3 class="text-sm font-semibold text-gray-800">订单明细</h3>
              <button @click="addItem" class="inline-flex items-center gap-1 px-3 py-1.5 border border-dashed border-emerald-300 text-emerald-600 text-xs rounded-lg hover:bg-emerald-50 transition-colors duration-200">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                添加商品
              </button>
            </div>
            <div class="overflow-x-auto rounded-lg border border-gray-200">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                    <th class="px-4 py-3 text-left w-2/5">商品名称</th>
                    <th class="px-4 py-3 text-right w-1/5">单价</th>
                    <th class="px-4 py-3 text-right w-1/6">数量</th>
                    <th class="px-4 py-3 text-right w-1/6">小计</th>
                    <th class="px-4 py-3 text-center w-10">操作</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <tr v-for="(item, i) in cf.items" :key="i">
                    <td class="px-4 py-2"><input v-model="item.itemName" placeholder="商品名称" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" /></td>
                    <td class="px-4 py-2"><input v-model.number="item.unitPrice" type="number" step="0.01" min="0" placeholder="0.00" @input="calcItem(i)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm text-right focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none tabular-nums" /></td>
                    <td class="px-4 py-2"><input v-model.number="item.quantity" type="number" min="1" placeholder="1" @input="calcItem(i)" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm text-right focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none tabular-nums" /></td>
                    <td class="px-4 py-2 text-right tabular-nums font-medium">￥{{ calcSubtotal(item) }}</td>
                    <td class="px-4 py-2 text-center"><button @click="removeItem(i)" class="text-red-400 hover:text-red-600 transition-colors duration-200"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></td>
                  </tr>
                </tbody>
                <tfoot>
                  <tr class="bg-gray-50 font-medium">
                    <td colspan="3" class="px-4 py-3 text-right text-gray-600">合计</td>
                    <td class="px-4 py-3 text-right tabular-nums">￥{{ calcTotal() }}</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
              <div v-if="cf.items.length === 0" class="text-center py-6 text-gray-400 text-sm">请点击「添加商品」添加订单明细</div>
            </div>
          </div>
        </div>
      </template>

      <div v-if="cv" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" @click.self="cCancel">
        <div class="bg-white rounded-xl shadow-xl p-6 min-w-[360px]">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
            <h3 class="text-base font-semibold text-gray-800">确认操作</h3>
          </div>
          <p class="text-sm text-gray-600 mb-6 ml-11">{{ cv }}</p>
          <div class="flex justify-end gap-2">
            <button @click="cCancel" class="px-4 py-2 border border-gray-300 text-gray-600 text-sm rounded-lg hover:bg-gray-50 transition-colors duration-200">取消</button>
            <button @click="cOk" class="px-4 py-2 bg-emerald-600 text-white text-sm rounded-lg hover:bg-emerald-700 transition-colors duration-200 shadow-sm">确定</button>
          </div>
        </div>
      </div>

      <div v-if="sv" class="fixed bottom-4 right-4 px-5 py-2.5 bg-gray-800 text-white text-sm rounded-lg shadow-lg z-50 transition-all duration-300">{{ sv }}</div>
    </div>
  </script>

  <div id="app"><order-page></order-page></div>
  <script>
    ;(function boot(){
      if (!_vueOk || !_axiosOk) { _queue.push(boot); return }
      if (!localStorage.getItem('auth_token')) { window.location.href = '登录.html'; return }

      const { ref, reactive, computed, onMounted, createApp } = Vue
      const api = axios.create({ baseURL: 'http://localhost:9090/api/v1', timeout: 10000, headers: { 'Content-Type': 'application/json' } })
      api.interceptors.request.use(cfg => { var t = localStorage.getItem('auth_token'); if (t) cfg.headers.Authorization = 'Bearer ' + t; return cfg })
      api.interceptors.response.use(function(r){return r}, function(e){ if (e.response && e.response.status === 401) { localStorage.removeItem('auth_token'); window.location.href = '登录.html' }; return Promise.reject(e) })

      const STATUS_MAP = { pending: '待确认', confirmed: '已确认', shipped: '已发货', completed: '已完成', cancelled: '已取消' }

      createApp({
        components: {
          'order-page': {
            template: document.getElementById('tpl').innerHTML,
            setup() {
              const loading = ref(false)
              const viewMode = ref('list')
              const showSearch = ref(true)
              const sf = reactive({ keyword: '', status: '' })
              const pg = reactive({ page: 1, size: 20 })
              const total = ref(0)
              const totalPages = computed(() => Math.max(1, Math.ceil(total.value / pg.size)))
              const list = ref([])
              const f = reactive({ id: '', orderNo: '', customerName: '', totalAmount: '', status: '', remark: '', createdAt: '', updatedAt: '', items: [] })
              const cf = reactive({ customerName: '', remark: '', items: [] })
              const sv = ref('')
              let st = null
              const toast = (msg) => { sv.value = msg; if (st) clearTimeout(st); st = setTimeout(() => sv.value = '', 3000) }
              const cv = ref('')
              let cr = null
              const confirm = (msg) => new Promise(r => { cv.value = msg; cr = r })
              const cOk = () => { cr?.(true); cv.value = ''; cr = null }
              const cCancel = () => { cr?.(false); cv.value = ''; cr = null }

              const statusClass = (s) => {
                return { pending: 'bg-yellow-100 text-yellow-700', confirmed: 'bg-blue-100 text-blue-700', shipped: 'bg-amber-100 text-amber-700', completed: 'bg-green-100 text-green-700', cancelled: 'bg-gray-100 text-gray-500' }[s] || 'bg-gray-100 text-gray-500'
              }
              const statusLabel = (s) => STATUS_MAP[s] || s

              async function doFetch() {
                loading.value = true
                try {
                  const res = await api.get('/orders', { params: { keyword: sf.keyword || undefined, status: sf.status || undefined, page: pg.page, size: pg.size } })
                  var body = res.data
                  total.value = body.total ?? 0
                  list.value = body.content ?? []
                } catch (e) {
                  if (e.response?.status !== 401) toast('获取订单列表失败')
                } finally { loading.value = false }
              }

              function search() { pg.page = 1; doFetch() }
              function clear() { Object.assign(sf, { keyword: '', status: '' }); pg.page = 1; doFetch() }

              async function doDetail(row) {
                viewMode.value = 'detail'
                try {
                  var res = await api.get('/orders/' + row.id)
                  var d = res.data
                  Object.assign(f, { id: d.id, orderNo: d.orderNo, customerName: d.customerName, totalAmount: d.totalAmount, status: d.status, remark: d.remark || '', createdAt: d.createdAt, updatedAt: d.updatedAt, items: d.items || [] })
                } catch (e) { toast('获取订单详情失败'); doBack() }
              }

              function doCreate() {
                viewMode.value = 'create'
                cf.customerName = ''; cf.remark = ''; cf.items = []
                addItem()
              }

              function addItem() { cf.items.push({ itemName: '', unitPrice: '', quantity: 1 }) }
              function removeItem(i) { cf.items.splice(i, 1) }
              function calcSubtotal(item) { var p = Number(item.unitPrice) || 0; var q = Number(item.quantity) || 0; return (p * q).toFixed(2) }
              function calcTotal() { return cf.items.reduce(function(s, item) { return s + (Number(item.unitPrice) || 0) * (Number(item.quantity) || 0) }, 0).toFixed(2) }
              function calcItem(i) { /* reactive */ }

              async function doSave() {
                if (!cf.customerName) return toast('客户姓名不能为空')
                if (!cf.items.length) return toast('请至少添加一个商品')
                for (var i = 0; i < cf.items.length; i++) {
                  if (!cf.items[i].itemName) return toast('第' + (i + 1) + '行商品名称不能为空')
                  if (!cf.items[i].unitPrice || Number(cf.items[i].unitPrice) <= 0) return toast('第' + (i + 1) + '行价格必须大于0')
                }
                try {
                  var body = { customerName: cf.customerName, remark: cf.remark || undefined, items: cf.items.map(function(item) { return { itemName: item.itemName, quantity: Number(item.quantity) || 1, unitPrice: Number(item.unitPrice) } }) }
                  await api.post('/orders', body)
                  toast('创建成功'); doBack()
                } catch (e) {
                  if (e.response?.status === 401) return
                  toast(e.response?.data?.message || '创建失败')
                }
              }

              function doBack() { viewMode.value = 'list'; doFetch() }

              async function doChangeStatus(row, targetStatus) {
                var label = STATUS_MAP[targetStatus]
                var ok = await confirm('确认将订单「' + row.orderNo + '"' + label + '？')
                if (!ok) return
                try {
                  var detailRes = await api.get('/orders/' + row.id)
                  await api.patch('/orders/' + row.id + '/status', { status: targetStatus, updatedAt: detailRes.data.updatedAt })
                  toast(label + '成功'); doFetch()
                } catch (e) {
                  if (e.response?.status === 401) return
                  if (e.response?.data?.code === 'E9409') toast('数据已被其他用户修改，请刷新后重试')
                  else toast(e.response?.data?.message || '操作失败')
                }
              }

              onMounted(() => doFetch())

              return { loading, viewMode, showSearch, sf, pg, total, totalPages, list, f, cf, sv, cv,
                       statusClass, statusLabel, search, clear, doCreate, doDetail, doSave, doBack,
                       addItem, removeItem, calcSubtotal, calcTotal, calcItem, doChangeStatus,
                       cOk, cCancel }
            }
          }
        }
      }).mount('#app')
    })()
  </script>
</body>
</html>
