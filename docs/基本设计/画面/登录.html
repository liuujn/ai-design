<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    var _vueOk = false, _axiosOk = false, _queue = []
    function _tryCDN(name, urls, i) {
      if (i >= urls.length) return
      var s = document.createElement('script')
      s.src = urls[i]
      s.onload = function() { if (name === 'vue') _vueOk = true; else _axiosOk = true; while (_queue.length && _vueOk && _axiosOk) _queue.shift()() }
      s.onerror = function() { _tryCDN(name, urls, i+1) }
      document.head.appendChild(s)
    }
    _tryCDN('vue', ['https://cdnjs.cloudflare.com/ajax/libs/vue/3.5.13/vue.global.prod.js','https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js','https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js'], 0)
    _tryCDN('axios', ['https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.9/axios.min.js','https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js','https://unpkg.com/axios@1.7.9/dist/axios.min.js'], 0)
    setTimeout(function() {
      if (!_vueOk || !_axiosOk) {
        var el = document.getElementById('app')
        if (el) el.innerHTML = '<div style="padding:40px;text-align:center;font-size:14px;"><p style="color:red;">依赖加载失败</p><p style="color:#999;margin-top:8px;">请检查网络连接后 <a href="#" onclick="location.reload()" style="color:#3b82f6;">刷新页面</a></p></div>'
      }
    }, 15000)
  </script>
</head>
<body class="bg-gray-50">
  <script id="tpl" type="text/x-template">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-xl shadow-lg mb-4">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <h2 class="text-2xl font-bold text-gray-900">系统登录</h2>
          <p class="text-sm text-gray-500 mt-1">请输入您的账号和密码</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
          <div v-if="errMsg" class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2 text-sm">
            <svg class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="text-red-600">{{ errMsg }}</span>
          </div>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">用户账号</label>
              <input v-model="form.username" @keyup.enter="doLogin" placeholder="请输入用户账号" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200" :class="{'border-red-300': errMsg}" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">登录密码</label>
              <div class="relative">
                <input v-model="form.password" @keyup.enter="doLogin" :type="showPwd ? 'text' : 'password'" placeholder="请输入密码" class="w-full px-4 py-2.5 pr-11 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200" :class="{'border-red-300': errMsg}" />
                <button @click="showPwd = !showPwd" type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                  <svg v-if="!showPwd" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                  <svg v-else class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                </button>
              </div>
            </div>

            <div class="flex items-center justify-between">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" v-model="form.rememberMe" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
                <span class="text-sm text-gray-600">记住我</span>
              </label>
            </div>

            <button @click="doLogin" :disabled="loading" class="w-full py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed transition-all duration-200 shadow-sm flex items-center justify-center gap-2">
              <svg v-if="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
              {{ loading ? '登录中...' : '登 录' }}
            </button>
          </div>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">Copyright &copy; {{ year }} GCSOFT Inc. All rights reserved.</p>
      </div>
    </div>
  </script>

  <div id="app"><login-page></login-page></div>

  <script>
    ;(function bootApp() {
      if (!_vueOk || !_axiosOk) { _queue.push(bootApp); return }
      const { ref, reactive, createApp } = Vue
      const api = axios.create({ baseURL: 'http://localhost:9090/api/v1', timeout: 10000, headers: { 'Content-Type': 'application/json' } })

      createApp({
        components: {
          'login-page': {
            template: document.getElementById('tpl').innerHTML,
            setup() {
              const loading = ref(false)
              const showPwd = ref(false)
              const errMsg = ref('')
              const year = ref(new Date().getFullYear())
              const form = reactive({ username: '', password: '', rememberMe: false })

              function validate() {
                if (!form.username) { errMsg.value = '用户名不能为空'; return false }
                if (!form.password) { errMsg.value = '密码不能为空'; return false }
                return true
              }

              async function doLogin() {
                errMsg.value = ''
                if (!validate()) return
                loading.value = true
                try {
                  const res = await api.post('/auth/login', { username: form.username, password: form.password, rememberMe: form.rememberMe })
                  if (res.data.accessToken) {
                    localStorage.setItem('auth_token', res.data.accessToken)
                    if (res.data.refreshToken) localStorage.setItem('refresh_token', res.data.refreshToken)
                    if (res.data.userId) localStorage.setItem('user_id', res.data.userId)
                    if (res.data.userName) localStorage.setItem('user_name', res.data.userName)
                    window.location.href = '主页.html'
                  } else { errMsg.value = res.data.message || '登录失败，请重试' }
                } catch (e) {
                  if (e.response) {
                    var m = e.response.data?.message || ''
                    if (e.response.status === 401) { errMsg.value = '用户名或密码不正确' }
                    else if (e.response.status === 423) { errMsg.value = '账户已被锁定，请稍后重试' }
                    else if (e.response.status === 403) { errMsg.value = '账户不可用' }
                    else { errMsg.value = m || '登录失败' }
                  } else { errMsg.value = '网络错误，请检查后端服务是否启动' }
                } finally { loading.value = false }
              }

              return { form, loading, showPwd, errMsg, year, doLogin }
            }
          }
        }
      }).mount('#app')
    })()
  </script>
</body>
</html>
